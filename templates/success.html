<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success · Mail Temple</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0B0B0B;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 500px;
        }
        .checkmark {
            font-size: 5rem;
            color: #00E5FF;
            margin-bottom: 20px;
            animation: popIn 0.6s ease-out;
        }
        h1 {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 2rem;
            background: linear-gradient(135deg, #00E5FF, #FF6D00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            margin: 20px 0 30px;
        }
        .btn {
            display: inline-block;
            background: #00E5FF;
            color: #000;
            padding: 14px 36px;
            border-radius: 60px;
            font-weight: 700;
            font-family: 'Orbitron', monospace;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="checkmark"><i class="fas fa-check-circle"></i></div>
    <h1>Thank You!</h1>
    <p>Your Premium subscription is now active.<br>You can close this page and return to your inbox.</p>
    <a href="/" class="btn"><i class="fas fa-arrow-left"></i> Go to Inbox</a>
</div>
</body>
</html>
