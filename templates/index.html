<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mail Temple · Disposable Email</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ---- NEON THEME (match Flutter) ---- */
        :root {
            --bg: #0B0B0B;
            --surface: rgba(20, 20, 20, 0.9);
            --surface2: rgba(26, 26, 26, 0.8);
            --text: #ffffff;
            --text2: rgba(255, 255, 255, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --neon-cyan: #00E5FF;
            --neon-magenta: #FF0055;
            --neon-orange: #FF6D00;
            --shadow: 0 8px 32px rgba(0, 229, 255, 0.15);
            --radius: 24px;
            --radius-sm: 16px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Light variant (still neon, but lighter background) */
        .light {
            --bg: #f0f4f8;
            --surface: rgba(255, 255, 255, 0.85);
            --surface2: rgba(240, 244, 248, 0.8);
            --text: #0f172a;
            --text2: #475569;
            --border: rgba(0, 0, 0, 0.1);
            --shadow: 0 8px 32px rgba(0, 229, 255, 0.2);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 24px 16px 60px;
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            max-width: 880px;
            width: 100%;
            margin: 0 auto;
        }
        /* ---- HEADER with Cat Icon & Account ---- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }
        .logo i {
            font-size: 2.2rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
            transition: text-shadow var(--transition);
        }
        .logo:hover i {
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.7);
        }
        .logo-text {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-actions a {
            color: var(--text);
            font-size: 1.6rem;
            transition: all var(--transition);
            text-decoration: none;
        }
        .header-actions a:hover {
            color: var(--neon-cyan);
            transform: scale(1.1);
        }
        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all var(--transition);
            backdrop-filter: blur(6px);
        }
        .theme-toggle:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            transform: scale(1.05);
        }

        /* ---- Cards (glass) ---- */
        .card {
            background: var(--surface);
            backdrop-filter: blur(8px);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }
        .card:hover {
            box-shadow: 0 8px 40px rgba(0, 229, 255, 0.2);
            border-color: rgba(0, 229, 255, 0.3);
        }

        .badge-auto {
            background: rgba(0, 229, 255, 0.12);
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 0.7rem;
            font-weight: 700;
            font-family: 'Orbitron', monospace;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }
        .badge-auto i {
            font-size: 0.6rem;
        }

        .address-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin: 20px 0 16px;
        }
        .email-display {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            padding: 14px 24px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            border: 1px solid rgba(0, 229, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.05);
            word-break: break-all;
            color: var(--neon-cyan);
            transition: all var(--transition);
        }
        .email-display:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.15);
        }

        /* ---- Buttons (Neon) ---- */
        .btn {
            border-radius: 60px;
            padding: 12px 28px;
            font-weight: 700;
            font-size: 0.8rem;
            font-family: 'Orbitron', monospace;
            letter-spacing: 0.8px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            white-space: nowrap;
            outline: none;
            text-transform: uppercase;
        }
        .btn:focus-visible {
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.5);
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.3);
        }
        .btn-primary:hover {
            background: #00d4f0;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.5);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            background: rgba(0, 229, 255, 0.1);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
        }
        .btn-danger {
            background: var(--neon-magenta);
            color: #fff;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.3);
        }
        .btn-danger:hover {
            background: #e6004c;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.5);
            transform: translateY(-2px);
        }
        /* Premium button (orange) */
        .btn-premium {
            background: var(--neon-orange);
            color: #000;
            box-shadow: 0 0 25px rgba(255, 109, 0, 0.3);
        }
        .btn-premium:hover {
            background: #e65c00;
            box-shadow: 0 0 40px rgba(255, 109, 0, 0.5);
            transform: translateY(-2px);
        }

        .inbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .inbox-title {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }
        .inbox-title i {
            color: var(--neon-cyan);
        }
        .unread-badge {
            background: var(--neon-magenta);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 30px;
            display: none;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }
        .refresh-info {
            font-size: 0.75rem;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Orbitron', monospace;
        }
        .refresh-info i {
            color: var(--neon-cyan);
        }

        /* ---- Email List ---- */
        .email-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .email-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all var(--transition);
            user-select: none;
            outline: none;
            backdrop-filter: blur(4px);
        }
        .email-item:hover {
            background: rgba(0, 229, 255, 0.05);
            border-color: rgba(0, 229, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .email-item:active { transform: scale(0.99); }
        .unread-dot {
            width: 10px;
            height: 10px;
            background: var(--neon-cyan);
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.6);
        }
        .email-content { flex: 1; min-width: 0; }
        .email-sender {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .email-subject {
            font-size: 0.85rem;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .email-meta {
            font-size: 0.7rem;
            color: var(--text2);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .email-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity var(--transition);
        }
        .email-item:hover .email-actions,
        .email-item:focus-within .email-actions { opacity: 1; }
        .icon-btn {
            background: transparent;
            border: none;
            font-size: 1.1rem;
            color: var(--text2);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: all var(--transition);
            outline: none;
        }
        .icon-btn:hover {
            color: var(--neon-magenta);
            background: rgba(255, 0, 85, 0.1);
        }
        .icon-btn:focus-visible { box-shadow: 0 0 0 2px var(--neon-cyan); }

        /* ---- Empty State ---- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2);
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            opacity: 0.6;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.2));
        }
        .empty-state small {
            display: block;
            margin-top: 8px;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        /* ---- Premium Card (replaces Patreon) ---- */
        .premium-card {
            background: linear-gradient(135deg, rgba(255, 109, 0, 0.08), rgba(0, 229, 255, 0.06));
            border: 1px solid rgba(255, 109, 0, 0.25);
            border-radius: var(--radius);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 30px rgba(255, 109, 0, 0.05);
        }
        .premium-card .text {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }
        .premium-card .text i {
            color: var(--neon-orange);
            font-size: 1.6rem;
        }
        .premium-card .text strong {
            color: var(--neon-orange);
        }

        /* ---- MODAL (neon) ---- */
        .modal-overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index:1000;
            padding:16px;
            animation: fadeIn 0.25s ease;
        }
        .modal-card {
            background: var(--surface);
            max-width:700px;
            width:100%;
            border-radius: 24px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.1);
            display: flex;
            flex-direction: column;
            max-height: 85vh;
            animation: slideUp 0.3s ease;
            outline: none;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        .modal-header, .modal-footer {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            color: var(--neon-cyan);
            letter-spacing: 0.5px;
        }
        .modal-footer { border-top: 1px solid var(--border); border-bottom: none; justify-content: flex-end; gap:12px; }
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex:1;
        }
        .modal-body .meta {
            display: flex;
            justify-content: space-between;
            color: var(--text2);
            font-size: 0.85rem;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .modal-body .meta strong { color: var(--text); }
        .email-body-container {
            background: rgba(0,0,0,0.3);
            border-radius: var(--radius-sm);
            padding: 20px;
            font-family: 'Inter', sans-serif;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.7;
            max-height: 50vh;
            overflow: auto;
            border: 1px solid var(--border);
        }
        .iframe-viewer {
            width: 100%;
            border: none;
            border-radius: var(--radius-sm);
            min-height: 300px;
            background: white;
        }
        .btn-close {
            background: none;
            border: none;
            font-size: 2rem;
            color: var(--text2);
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            transition: color var(--transition);
        }
        .btn-close:hover { color: var(--text); }

        /* ---- Confirm Dialog ---- */
        .confirm-dialog {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 16px;
        }
        .confirm-box {
            background: var(--surface);
            border-radius: 24px;
            padding: 32px;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.1);
            text-align: center;
        }
        .confirm-box p {
            font-weight: 500;
            font-size: 1.1rem;
        }
        .confirm-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: center;
        }

        /* ---- Skeleton Loader (neon) ---- */
        .skeleton {
            display: flex;
            gap: 14px;
            padding: 16px 20px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.02);
            align-items: center;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        .skeleton-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
        }
        .skeleton-line {
            height: 10px;
            background: var(--border);
            border-radius: 6px;
        }
        .skeleton-line.short { width: 40%; }
        .skeleton-line.medium { width: 70%; }
        .skeleton-line.long { width: 90%; }

        /* ---- Toast ---- */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            backdrop-filter: blur(12px);
            color: var(--text);
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.1);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 2000;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .toast.show { opacity: 1; pointer-events: auto; }
        .toast .undo-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            border-radius: 30px;
            padding: 4px 14px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all var(--transition);
        }
        .toast .undo-btn:hover {
            background: var(--neon-cyan);
            color: #000;
        }

        /* ---- Responsive ---- */
        @media (max-width: 600px) {
            .header { flex-wrap: wrap; gap: 12px; }
            .logo-text { font-size: 1.4rem; }
            .email-item { flex-direction: column; align-items: flex-start; }
            .email-actions { align-self: flex-end; opacity:1; }
            .address-row { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            .premium-card { flex-direction: column; align-items: stretch; text-align: center; }
            .modal-card { max-width: 100%; margin: 0 8px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <i class="fas fa-cat"></i>
            <span class="logo-text">MAIL TEMPLE</span>
        </div>
        <div class="header-actions">
            <!-- ✅ Conditional account link -->
            <a href="{{ url_for('account') if is_logged_in else url_for('auth') }}" aria-label="Account" title="Account">
                <i class="fas fa-user-circle"></i>
            </a>
            <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode" aria-label="Toggle theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <div class="badge-auto"><i class="fas fa-sync-alt fa-spin"></i> Auto‑refresh 10s</div>
        </div>
        <div class="address-row">
            <div class="email-display" id="currentEmail">—</div>
            <button class="btn btn-outline" id="copyAddressBtn"><i class="far fa-copy"></i> Copy</button>
        </div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-primary" id="newAddressBtn"><i class="fas fa-plus-circle"></i> New Address</button>
            <button class="btn btn-danger" id="deleteAllBtn"><i class="far fa-trash-alt"></i> Delete All</button>
        </div>
    </div>

    <div class="card">
        <div class="inbox-header">
            <div class="inbox-title">
                <i class="fas fa-inbox"></i> Inbox
                <span id="unreadCountBadge" class="unread-badge">0</span>
            </div>
            <div class="refresh-info">
                <i class="fas fa-hourglass-half"></i> <span id="countdownSec">10</span>s
                <button id="manualRefreshBtn" class="icon-btn" title="Refresh now" aria-label="Refresh inbox"><i class="fas fa-rotate-right"></i></button>
            </div>
        </div>
        <div id="inboxContainer">
            <!-- Skeleton loaders -->
            <div class="skeleton"><div class="skeleton-dot"></div><div class="email-content" style="flex:1"><div class="skeleton-line medium"></div><div class="skeleton-line short" style="margin-top:8px;"></div><div class="skeleton-line long" style="margin-top:8px;"></div></div></div>
            <div class="skeleton"><div class="skeleton-dot"></div><div class="email-content" style="flex:1"><div class="skeleton-line medium"></div><div class="skeleton-line short" style="margin-top:8px;"></div><div class="skeleton-line long" style="margin-top:8px;"></div></div></div>
            <div class="skeleton"><div class="skeleton-dot"></div><div class="email-content" style="flex:1"><div class="skeleton-line medium"></div><div class="skeleton-line short" style="margin-top:8px;"></div><div class="skeleton-line long" style="margin-top:8px;"></div></div></div>
        </div>
    </div>

    <!-- PREMIUM CARD (replaces Patreon) -->
    <div class="premium-card">
        <div class="text">
            <i class="fas fa-crown"></i>
            <span><strong>Go Premium</strong> – No ads · Unlimited inboxes · 30-day retention</span>
        </div>
        <button class="btn btn-premium" id="upgradePremiumBtn">
            <i class="fas fa-star"></i> Upgrade to Premium
        </button>
    </div>
</div>

<!-- Email Modal -->
<div class="modal-overlay" id="messageModal" role="dialog" aria-modal="true" aria-labelledby="modalSubject">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="modalSubject">Subject</h3>
            <button class="btn-close" id="closeModalBtn" aria-label="Close modal">&times;</button>
        </div>
        <div class="modal-body">
            <div class="meta">
                <span><strong>From:</strong> <span id="modalFrom"></span></span>
                <span><strong>Date:</strong> <span id="modalDate"></span></span>
            </div>
            <div id="modalContentContainer"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" id="modalDeleteBtn"><i class="far fa-trash-alt"></i> Delete</button>
            <button class="btn btn-primary" id="closeModalFooterBtn">Close</button>
        </div>
    </div>
</div>

<!-- Custom confirm dialog -->
<div id="confirmDialog" class="confirm-dialog" style="display:none;" role="alertdialog" aria-modal="true">
    <div class="confirm-box">
        <p id="confirmMessage">Are you sure?</p>
        <div class="confirm-buttons">
            <button class="btn btn-outline" id="confirmCancel">Cancel</button>
            <button class="btn btn-danger" id="confirmOk">Confirm</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
    // ── Theme persistence (default dark) ──
    (function() {
        const themeToggle = document.getElementById('themeToggle');
        const darkIcon = '<i class="fas fa-moon"></i>';
        const lightIcon = '<i class="fas fa-sun"></i>';
        const saved = localStorage.getItem('mailtemple-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = saved ? saved === 'dark' : prefersDark;
        if (isDark) {
            document.documentElement.classList.remove('light');
            themeToggle.innerHTML = lightIcon;
        } else {
            document.documentElement.classList.add('light');
            themeToggle.innerHTML = darkIcon;
        }
        themeToggle.addEventListener('click', () => {
            const isLight = document.documentElement.classList.toggle('light');
            themeToggle.innerHTML = isLight ? darkIcon : lightIcon;
            localStorage.setItem('mailtemple-theme', isLight ? 'light' : 'dark');
        });
    })();

    // ── All JavaScript functions remain exactly the same ──
    let autoRefreshInterval, countdownInterval;
    let countdown = 10;
    let currentEmail = null;
    let pendingDeleteTimeout = null;

    async function apiCall(url, options = {}) {
        const res = await fetch(url, { ...options, headers: { 'Content-Type': 'application/json' } });
        if (!res.ok) {
            const error = await res.json().catch(() => ({ error: 'Request failed' }));
            throw new Error(error.error || `HTTP ${res.status}`);
        }
        return res.json();
    }

    function showSkeleton(container) {
        container.innerHTML = '';
        for (let i = 0; i < 3; i++) {
            container.innerHTML += `<div class="skeleton"><div class="skeleton-dot"></div><div class="email-content" style="flex:1"><div class="skeleton-line medium"></div><div class="skeleton-line short" style="margin-top:8px;"></div><div class="skeleton-line long" style="margin-top:8px;"></div></div></div>`;
        }
    }

    async function loadInbox() {
        const container = document.getElementById('inboxContainer');
        showSkeleton(container);
        try {
            const data = await apiCall('/api/inbox');
            renderInbox(data.messages);
        } catch (err) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Failed to load inbox. ${err.message}</p><button onclick="location.reload()" class="btn btn-outline" style="margin-top:12px;">Retry</button></div>`;
        }
    }

    function renderInbox(messages) {
        const container = document.getElementById('inboxContainer');
        const unreadCount = messages.filter(m => !m.read).length;
        const badge = document.getElementById('unreadCountBadge');
        if (unreadCount > 0) {
            badge.style.display = 'inline-block';
            badge.innerText = unreadCount;
            document.title = `(${unreadCount}) Mail Temple`;
        } else {
            badge.style.display = 'none';
            document.title = 'Mail Temple · Disposable Email';
        }

        if (!messages.length) {
            container.innerHTML = `<div class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" opacity="0.5"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                <p style="font-size:1.2rem; font-weight:500;">📭 Inbox empty</p>
                <small>Send an email to your temporary address and it will appear here automatically.</small>
            </div>`;
            return;
        }

        let html = '<div class="email-list">';
        messages.forEach(msg => {
            const timeAgo = new Date(msg.timestamp * 1000).toLocaleString();
            const unreadDot = !msg.read ? '<span class="unread-dot"></span>' : '';
            html += `
                <div class="email-item" data-id="${msg.id}" role="button" tabindex="0" aria-label="Email from ${escapeHtml(msg.from)}: ${escapeHtml(msg.subject)}">
                    ${unreadDot}
                    <div class="email-content">
                        <div class="email-sender">${escapeHtml(msg.from)}</div>
                        <div class="email-subject">${escapeHtml(msg.subject)}</div>
                        <div class="email-meta"><i class="far fa-clock"></i> ${timeAgo}</div>
                    </div>
                    <div class="email-actions">
                        <button class="icon-btn delete-single" data-id="${msg.id}" title="Delete" aria-label="Delete email"><i class="fas fa-trash-alt"></i></button>
                        <button class="icon-btn read-btn" data-id="${msg.id}" title="Read" aria-label="Open email"><i class="fas fa-envelope-open-text"></i></button>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;

        document.querySelectorAll('.delete-single').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                handleDeleteWithUndo(id);
            });
        });
        document.querySelectorAll('.read-btn, .email-item').forEach(el => {
            el.addEventListener('click', async (e) => {
                if (e.target.closest('.delete-single') || e.target.closest('.icon-btn')) return;
                const id = el.closest('.email-item')?.dataset.id;
                if (id) await openMessage(id);
            });
            el.addEventListener('keydown', async (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    if (e.target.closest('.delete-single') || e.target.closest('.icon-btn')) return;
                    const id = el.closest('.email-item')?.dataset.id;
                    if (id) await openMessage(id);
                }
            });
        });
    }

    async function handleDeleteWithUndo(msgId) {
        const item = document.querySelector(`.email-item[data-id="${msgId}"]`);
        if (item) item.style.opacity = '0.5';
        const toast = document.getElementById('toast');
        toast.innerHTML = `Message deleted <button class="undo-btn" id="undoDeleteBtn">Undo</button>`;
        toast.classList.add('show');
        if (pendingDeleteTimeout) clearTimeout(pendingDeleteTimeout);
        pendingDeleteTimeout = setTimeout(async () => {
            await apiCall(`/api/delete/${msgId}`, { method: 'POST' });
            loadInbox();
            toast.classList.remove('show');
            pendingDeleteTimeout = null;
        }, 5000);
        document.getElementById('undoDeleteBtn').addEventListener('click', () => {
            if (pendingDeleteTimeout) clearTimeout(pendingDeleteTimeout);
            pendingDeleteTimeout = null;
            toast.classList.remove('show');
            loadInbox();
        });
    }

    async function openMessage(msgId) {
        try {
            const msg = await apiCall(`/api/message/${msgId}`);
            document.getElementById('modalSubject').innerText = msg.subject || '(no subject)';
            document.getElementById('modalFrom').innerText = msg.from;
            document.getElementById('modalDate').innerText = new Date(msg.date * 1000).toLocaleString();
            const container = document.getElementById('modalContentContainer');
            const body = msg.body || '';
            if (/<[a-z][\s\S]*>/i.test(body)) {
                container.innerHTML = `<iframe class="iframe-viewer" sandbox="allow-same-origin" srcdoc="${escapeHtmlAttribute(body)}" style="min-height: 300px; border: none; border-radius: 12px; width: 100%;"></iframe>`;
            } else {
                container.innerHTML = `<div class="email-body-container">${escapeHtml(body).replace(/\n/g, '<br>')}</div>`;
            }
            const modal = document.getElementById('messageModal');
            modal.style.display = 'flex';
            document.getElementById('closeModalBtn').focus();
            const delBtn = document.getElementById('modalDeleteBtn');
            const newDel = delBtn.cloneNode(true);
            delBtn.parentNode.replaceChild(newDel, delBtn);
            newDel.addEventListener('click', async () => {
                await apiCall(`/api/delete/${msgId}`, { method: 'POST' });
                closeModal();
                loadInbox();
                showSimpleToast('Message deleted');
            });
        } catch (err) {
            showSimpleToast('Failed to load message');
        }
    }

    function closeModal() {
        document.getElementById('messageModal').style.display = 'none';
    }

    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('closeModalFooterBtn').addEventListener('click', closeModal);
    window.addEventListener('click', (e) => {
        if (e.target === document.getElementById('messageModal')) closeModal();
    });
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            const modal = document.getElementById('messageModal');
            if (modal.style.display === 'flex') closeModal();
        }
    });

    function customConfirm(message) {
        return new Promise((resolve) => {
            const dialog = document.getElementById('confirmDialog');
            document.getElementById('confirmMessage').innerText = message;
            dialog.style.display = 'flex';
            document.getElementById('confirmOk').onclick = () => {
                dialog.style.display = 'none';
                resolve(true);
            };
            document.getElementById('confirmCancel').onclick = () => {
                dialog.style.display = 'none';
                resolve(false);
            };
        });
    }

    async function createSilentAddress() {
        try {
            const data = await apiCall('/api/new', { method: 'POST' });
            currentEmail = data.email;
            document.getElementById('currentEmail').innerText = currentEmail;
            loadInbox();
            resetCountdown();
        } catch (err) {
            showSimpleToast('Error: ' + err.message);
        }
    }

    async function newAddress() {
        const confirmed = await customConfirm('Generate a new email address? Current inbox will be erased permanently.');
        if (!confirmed) return;
        await createSilentAddress();
    }

    async function deleteAll() {
        const confirmed = await customConfirm('Delete ALL messages in this inbox? This cannot be undone.');
        if (!confirmed) return;
        await apiCall('/api/delete_all', { method: 'POST' });
        loadInbox();
        showSimpleToast('All messages deleted');
    }

    async function initSession() {
        try {
            const status = await apiCall('/api/status');
            if (status.email) {
                currentEmail = status.email;
                document.getElementById('currentEmail').innerText = currentEmail;
                loadInbox();
            } else {
                await createSilentAddress();
            }
        } catch (err) {
            console.warn('Session check failed');
            await createSilentAddress();
        }
    }

    function copyAddress() {
        if (currentEmail && currentEmail !== '—') {
            navigator.clipboard.writeText(currentEmail);
            const btn = document.getElementById('copyAddressBtn');
            const icon = btn.querySelector('i');
            icon.className = 'fas fa-check';
            btn.style.color = 'var(--neon-cyan)';
            showSimpleToast('📋 Email copied');
            setTimeout(() => {
                icon.className = 'far fa-copy';
                btn.style.color = '';
            }, 2000);
        } else {
            showSimpleToast('No email address yet');
        }
    }

    function showSimpleToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerHTML = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function resetCountdown() { countdown = 10; document.getElementById('countdownSec').innerText = countdown; }

    function startAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        if (countdownInterval) clearInterval(countdownInterval);
        resetCountdown();
        autoRefreshInterval = setInterval(() => { loadInbox(); resetCountdown(); }, 10000);
        countdownInterval = setInterval(() => {
            if (countdown > 1) { countdown--; document.getElementById('countdownSec').innerText = countdown; }
            else resetCountdown();
        }, 1000);
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await initSession();
        startAutoRefresh();
        document.getElementById('newAddressBtn').addEventListener('click', newAddress);
        document.getElementById('deleteAllBtn').addEventListener('click', deleteAll);
        document.getElementById('copyAddressBtn').addEventListener('click', copyAddress);
        document.getElementById('manualRefreshBtn').addEventListener('click', () => { loadInbox(); resetCountdown(); showSimpleToast('Refreshing…'); });
        // Premium button – for now, just a toast (you can link to a premium page later)
        document.getElementById('upgradePremiumBtn').addEventListener('click', () => {
            showSimpleToast('⭐ Upgrade page coming soon!');
        });
    });

    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    function escapeHtmlAttribute(str) {
        return String(str).replace(/"/g, '&quot;').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
</script>
</body>
</html>
