<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TempMail · Disposable Email Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f7fb;
            color: #1a2c3e;
            line-height: 1.4;
            padding: 20px 16px 48px;
        }
        .container {
            max-width: 860px;
            margin: 0 auto;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.03);
            padding: 20px 24px;
            margin-bottom: 24px;
            border: 1px solid #eef2f6;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
        }
        .badge-auto {
            background: #eef2ff;
            color: #1f4f9e;
            border-radius: 100px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .address-group {
            background: #f8fafd;
            border-radius: 20px;
            padding: 6px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }
        .email-address {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.95rem;
            font-weight: 500;
            background: white;
            padding: 10px 16px;
            border-radius: 40px;
            flex: 1;
            word-break: break-all;
            border: 1px solid #e2e8f0;
        }
        .copy-btn, .btn-primary, .btn-outline {
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .copy-btn {
            background: white;
            border: 1px solid #dce3ec;
            color: #2c5a9e;
        }
        .copy-btn:hover { background: #f0f4fa; }
        .btn-primary {
            background: #1f6392;
            color: white;
        }
        .btn-primary:hover { background: #0f4b70; }
        .btn-outline {
            background: transparent;
            border: 1px solid #cddae9;
            color: #3a5c7c;
        }
        .btn-outline:hover { background: #f0f4fa; border-color: #abc0dc; }
        .btn-danger-outline {
            border-color: #ffe2dd;
            color: #bc5c4c;
        }
        .btn-danger-outline:hover { background: #fff2ef; }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 6px;
        }
        .inbox-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .inbox-title {
            font-weight: 700;
            font-size: 1.35rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .new-badge {
            background: #e53e3e;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 30px;
        }
        .refresh-info {
            font-size: 0.75rem;
            color: #6c86a3;
            background: #f1f4f9;
            padding: 5px 12px;
            border-radius: 40px;
        }
        .email-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .email-item {
            background: #ffffff;
            border: 1px solid #eef2f8;
            border-radius: 20px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            cursor: pointer;
        }
        .email-item:hover { background: #fefefe; border-color: #cbddee; }
        .email-content { flex: 3; min-width: 160px; }
        .email-sender {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .unread-dot {
            width: 8px;
            height: 8px;
            background: #2b6e9f;
            border-radius: 50%;
            display: inline-block;
        }
        .email-subject {
            font-size: 0.85rem;
            color: #2c3f55;
            font-weight: 500;
        }
        .email-meta {
            font-size: 0.7rem;
            color: #7a8faa;
            margin-top: 4px;
        }
        .email-actions { display: flex; gap: 12px; }
        .icon-btn {
            background: none;
            border: none;
            font-size: 1rem;
            color: #8aa0bc;
            cursor: pointer;
            padding: 6px;
            border-radius: 40px;
        }
        .icon-btn:hover { color: #cf5a48; background: #fff1ee; }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #8aa3bf;
        }
        .support-card {
            background: #fffaf2;
            border: 1px solid #ffe6c7;
            border-radius: 24px;
            padding: 16px 20px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .ko-fi-btn {
            background: #ff5e5e;
            color: white;
            border-radius: 48px;
            padding: 8px 20px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .ko-fi-btn:hover { background: #e04545; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-card {
            background: white;
            max-width: 680px;
            width: 100%;
            border-radius: 32px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header, .modal-footer {
            padding: 18px 24px;
            border-bottom: 1px solid #ecf3f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-footer {
            border-top: 1px solid #ecf3f9;
            border-bottom: none;
            justify-content: flex-end;
            gap: 12px;
        }
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }
        .toast-msg {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2f3e;
            color: white;
            padding: 10px 22px;
            border-radius: 60px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1100;
        }
        @media (max-width: 560px) {
            .card { padding: 16px; }
            .email-item { flex-direction: column; align-items: flex-start; }
            .email-actions { align-self: flex-end; }
            .support-card { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <div style="display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-envelope-open-text" style="color: #1f6392; font-size: 1.6rem;"></i>
                <h2 style="font-weight: 700;">TempMail</h2>
            </div>
            <div class="badge-auto"><i class="fas fa-sync-alt"></i> Auto‑refresh 10s</div>
        </div>
        <div class="address-group">
            <div class="email-address" id="currentEmail">—</div>
            <button class="copy-btn" id="copyAddressBtn"><i class="far fa-copy"></i> Copy</button>
        </div>
        <div class="action-buttons">
            <button class="btn-primary" id="newAddressBtn"><i class="fas fa-plus-circle"></i> New address</button>
            <button class="btn-outline btn-danger-outline" id="deleteAllBtn"><i class="far fa-trash-alt"></i> Delete all</button>
        </div>
    </div>

    <div class="card">
        <div class="inbox-header">
            <div class="inbox-title">
                <i class="fas fa-inbox"></i> Inbox
                <span id="unreadCountBadge" class="new-badge" style="display: none;">0</span>
            </div>
            <div class="refresh-info">
                <i class="fas fa-hourglass-half"></i> Next check: <span id="countdownSec">10</span>s
                <button id="manualRefreshBtn" style="background: none; border: none; margin-left: 8px; color:#1f6392; cursor: pointer;"><i class="fas fa-rotate-right"></i></button>
            </div>
        </div>
        <div id="inboxContainer">
            <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i><p>Loading inbox...</p></div>
        </div>
        <div class="support-card">
            <div style="display: flex; align-items: center; gap: 12px;">
                <i class="fas fa-heart" style="color: #ff7b4a;"></i>
                <div>❤️ <strong>Enjoying TempMail?</strong> It's completely free. If it helps you, <strong>buy me a coffee</strong> – it keeps the lights on!</div>
            </div>
            <a href="https://ko-fi.com/tempmailproject" target="_blank" class="ko-fi-btn"><i class="fas fa-mug-hot"></i> Buy me a coffee</a>
        </div>
    </div>
</div>

<div id="messageModal" class="modal">
    <div class="modal-card">
        <div class="modal-header"><h3 id="modalSubject">Subject</h3><button class="icon-btn" id="closeModalBtn">&times;</button></div>
        <div class="modal-body"><p><strong>From:</strong> <span id="modalFrom"></span></p><p><strong>Date:</strong> <span id="modalDate"></span></p><hr><div id="modalContent" style="white-space: pre-wrap;"></div></div>
        <div class="modal-footer"><button class="btn-outline" id="modalDeleteBtn"><i class="far fa-trash-alt"></i> Delete</button><button class="btn-primary" id="closeModalFooterBtn">Close</button></div>
    </div>
</div>
<div id="toast" class="toast-msg">Copied</div>

<script>
    let autoRefreshInterval, countdownInterval;
    let countdown = 10;
    let currentEmail = null;

    async function apiCall(url, options = {}) {
        const res = await fetch(url, { ...options, headers: { 'Content-Type': 'application/json' } });
        if (!res.ok) {
            const error = await res.json().catch(() => ({ error: 'Request failed' }));
            throw new Error(error.error || `HTTP ${res.status}`);
        }
        return res.json();
    }

    async function loadInbox() {
        try {
            const data = await apiCall('/api/inbox');
            renderInbox(data.messages);
        } catch (err) {
            console.error(err);
            document.getElementById('inboxContainer').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Failed to load inbox. ${err.message}</p><button onclick="location.reload()" class="btn-outline" style="margin-top:12px;">Retry</button></div>`;
        }
    }

    function renderInbox(messages) {
        const container = document.getElementById('inboxContainer');
        const unreadCount = messages.filter(m => !m.read).length;
        const badge = document.getElementById('unreadCountBadge');
        if (unreadCount > 0) {
            badge.style.display = 'inline-block';
            badge.innerText = unreadCount;
        } else badge.style.display = 'none';

        if (!messages.length) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-envelope-open" style="font-size:2.5rem;"></i><p>📭 Inbox empty</p><small>New emails will appear automatically.</small></div>`;
            return;
        }

        let html = '<div class="email-list">';
        messages.forEach(msg => {
            const timeAgo = new Date(msg.timestamp * 1000).toLocaleString();
            const unreadDot = !msg.read ? '<span class="unread-dot"></span>' : '';
            html += `
                <div class="email-item" data-id="${msg.id}">
                    <div class="email-content">
                        <div class="email-sender">${unreadDot} ${escapeHtml(msg.from)}</div>
                        <div class="email-subject">${escapeHtml(msg.subject)}</div>
                        <div class="email-meta"><i class="far fa-clock"></i> ${timeAgo}</div>
                    </div>
                    <div class="email-actions">
                        <button class="icon-btn delete-single" data-id="${msg.id}" title="Delete"><i class="fas fa-trash-alt"></i></button>
                        <button class="icon-btn read-btn" data-id="${msg.id}" title="Read"><i class="fas fa-envelope-open-text"></i></button>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;

        document.querySelectorAll('.delete-single').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                if (confirm('Delete this message?')) {
                    await apiCall(`/api/delete/${id}`, { method: 'POST' });
                    loadInbox();
                    showToast('Message deleted');
                }
            });
        });
        document.querySelectorAll('.read-btn, .email-item').forEach(el => {
            el.addEventListener('click', async (e) => {
                if (e.target.closest('.delete-single')) return;
                const id = el.closest('.email-item')?.dataset.id;
                if (id) await openMessage(id);   // 🔥 FIX: NO parseInt – keep UUID string
            });
        });
    }

    async function openMessage(msgId) {
        try {
            const msg = await apiCall(`/api/message/${msgId}`);
            document.getElementById('modalSubject').innerText = msg.subject || '(no subject)';
            document.getElementById('modalFrom').innerText = msg.from;
            document.getElementById('modalDate').innerText = new Date(msg.date * 1000).toLocaleString();
            const content = msg.body_html || msg.body || '';
            document.getElementById('modalContent').innerHTML = content.replace(/\n/g, '<br>');
            const modal = document.getElementById('messageModal');
            modal.style.display = 'flex';
            const delBtn = document.getElementById('modalDeleteBtn');
            const newDel = delBtn.cloneNode(true);
            delBtn.parentNode.replaceChild(newDel, delBtn);
            newDel.addEventListener('click', async () => {
                await apiCall(`/api/delete/${msgId}`, { method: 'POST' });
                modal.style.display = 'none';
                loadInbox();
                showToast('Message deleted');
            });
        } catch (err) {
            showToast('Failed to load message');
        }
    }

    async function newAddress() {
        if (confirm('Generate a new email address? Current inbox will be erased permanently.')) {
            try {
                const data = await apiCall('/api/new', { method: 'POST' });
                currentEmail = data.email;
                document.getElementById('currentEmail').innerText = currentEmail;
                showToast('New address created');
                loadInbox();
                resetCountdown();
            } catch (err) {
                showToast('Error: ' + err.message);
            }
        }
    }

    async function deleteAll() {
        if (confirm('Delete ALL messages in this inbox? This cannot be undone.')) {
            await apiCall('/api/delete_all', { method: 'POST' });
            loadInbox();
            showToast('All messages deleted');
        }
    }

    async function initSession() {
        try {
            const status = await apiCall('/api/status');
            if (status.email) {
                currentEmail = status.email;
                document.getElementById('currentEmail').innerText = currentEmail;
                loadInbox();
                return true;
            } else {
                await newAddress();
                return true;
            }
        } catch (err) {
            console.warn('Session check failed, creating new address');
            await newAddress();
            return false;
        }
    }

    function copyAddress() {
        if (currentEmail && currentEmail !== '—') {
            navigator.clipboard.writeText(currentEmail);
            showToast('📋 Email copied');
        } else {
            showToast('No email address yet');
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }

    function resetCountdown() { countdown = 10; document.getElementById('countdownSec').innerText = countdown; }

    function startAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        if (countdownInterval) clearInterval(countdownInterval);
        resetCountdown();
        autoRefreshInterval = setInterval(() => { loadInbox(); resetCountdown(); }, 10000);
        countdownInterval = setInterval(() => {
            if (countdown > 1) { countdown--; document.getElementById('countdownSec').innerText = countdown; }
            else resetCountdown();
        }, 1000);
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await initSession();
        startAutoRefresh();
        document.getElementById('newAddressBtn').addEventListener('click', newAddress);
        document.getElementById('deleteAllBtn').addEventListener('click', deleteAll);
        document.getElementById('copyAddressBtn').addEventListener('click', copyAddress);
        document.getElementById('manualRefreshBtn').addEventListener('click', () => { loadInbox(); resetCountdown(); showToast('Refreshing...'); });
        const modal = document.getElementById('messageModal');
        const closeModal = () => modal.style.display = 'none';
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('closeModalFooterBtn').addEventListener('click', closeModal);
        window.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    });

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
</script>
</body>
</html>
